<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal Admin - Gerenciador de Banners</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .painel { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, button { display: block; width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #2e7d32; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #1b5e20; }
    </style>
</head>
<body>

<div class="painel">
    <h2>Adicionar Novo Banner</h2>
    
    <label>Imagem do Banner:</label>
    <input type="file" id="imagemBanner" accept="image/*">
    
    <label>Título / Texto Alternativo:</label>
    <input type="text" id="tituloBanner" placeholder="Ex: Excelência no conforto do seu lar">
    
    <label>Link do Botão (Opcional):</label>
    <input type="text" id="linkBanner" placeholder="Ex: /contato">
    
    <button id="btnSalvar">Salvar no Firebase</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // SUBSTITUA AS CHAVES ABAIXO PELAS DO SEU PROJETO
    const firebaseConfig = {
        apiKey: "AIzaSyBVyaqJZtZcn074_DGkNAiZ2SSq1EzoNx8",
        authDomain: "pazemcasahomecare.firebaseapp.com",
        projectId: "pazemcasahomecare",
        storageBucket: "pazemcasahomecare.firebasestorage.app",
        messagingSenderId: "209545876266",
        appId: "1:209545876266:web:95e88bbc922eb4b9fc8453"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Selecionando os campos que você preenche na tela
    const btnSalvar = document.getElementById("btnSalvar");
    const inputImagem = document.getElementById("imagemBanner");
    const inputTitulo = document.getElementById("tituloBanner");
    const inputLink = document.getElementById("linkBanner");

    // O que acontece quando você clica em "Salvar"
    btnSalvar.addEventListener("click", async () => {
        const arquivo = inputImagem.files[0];
        
        if (!arquivo) {
            alert("Por favor, selecione uma imagem do seu computador primeiro!");
            return;
        }

        try {
            // Avisa que está carregando para você não clicar duas vezes
            btnSalvar.innerText = "Enviando para o Firebase... Aguarde";
            btnSalvar.disabled = true;

            // 1. Prepara a pasta 'banners' no Storage com o nome do seu arquivo
            const storageRef = ref(storage, 'banners/' + arquivo.name);
            
            // 2. Faz o upload da foto
            await uploadBytes(storageRef, arquivo);
            
            // 3. Pega o link público da foto que acabou de subir
            const urlImagem = await getDownloadURL(storageRef);

            // 4. Salva as informações de texto e o link no banco de dados (Firestore)
            await addDoc(collection(db, "banners"), {
                imagem_url: urlImagem,
                titulo: inputTitulo.value,
                link: inputLink.value,
                ativo: true, // Já entra ativado no seu site
                ordem: Date.now() // Usa a data para manter uma ordem
            });

            alert("Sucesso! Banner adicionado ao painel.");
            
            // Limpa os campos para você poder adicionar outro
            inputImagem.value = "";
            inputTitulo.value = "";
            inputLink.value = "";
            
        } catch (error) {
            console.error("Erro:", error);
            alert("Deu um erro! Aperte F12 e olhe a aba Console para ver os detalhes.");
        } finally {
            // Volta o botão ao normal
            btnSalvar.innerText = "Salvar no Firebase";
            btnSalvar.disabled = false;
        }
    });
</script>
</body>
</html>
